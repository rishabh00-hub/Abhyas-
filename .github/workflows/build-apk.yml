name: Build APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Decode Keystore
        run: base64 -d debug.keystore.base64 > debug.keystore      
      - name: Build debug APK
        run: ./gradlew assembleDebug
      - name: Rename APK
        run: mv app/build/outputs/apk/debug/app-debug.apk Abhyas.apk
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Abhyas
          path: Abhyas.apk
